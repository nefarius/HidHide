version: 1.7.{build}.0
build_cloud: WIN-LKR467JS4GL
image: Windows
configuration: Release
branches:
  only:
    - master
    - /v\d+\.\d+\.\d+/
skip_commits:
  files:
    - '**/*.md'
test: off
platform:
- x64 # ARM64 is built in the same job
install:
- cmd: git submodule update --init --recursive
- ps: Setup-VS2022
- ps: |
    dotnet tool install --global wix --version 5.0.2
    $dotnetTools = Join-Path $env:USERPROFILE '.dotnet/tools'
    $env:PATH = "$dotnetTools;$env:PATH"
    wix extension add -g WixToolset.UI.wixext/5.0.2
build:
  parallel: true
  verbosity: minimal
build_script:
- ps: |
    $env:PATH = "$(Join-Path $env:USERPROFILE '.dotnet/tools');$env:PATH"
    powershell -ExecutionPolicy Bypass -File ".\build.ps1" Ci --configuration Release --platform x64
- ps: |
    $env:PATH = "$(Join-Path $env:USERPROFILE '.dotnet/tools');$env:PATH"
    powershell -ExecutionPolicy Bypass -File ".\build.ps1" Ci --configuration Release --platform ARM64
after_build:
# Cab generation moved into NUKE target `BuildCab` (part of `Ci`)
artifacts:
  # Forward slashes: AppVeyor resolves these reliably from repo root.
- path: artifacts/msi/**/*.msi
  # makecab often drops cabinets in cwd; keep disk1 for layouts that use it.
- path: HidHide_*.cab
- path: disk1/*.cab
- path: bin/**/*.pdb
deploy:
- provider: Environment
  name: BUILDBOT
  on:
    appveyor_repo_tag: true