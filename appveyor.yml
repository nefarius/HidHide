version: 1.7.{build}.0
build_cloud: WIN-LKR467JS4GL
image: Windows
configuration: Release
branches:
  only:
    - master
    - /v\d+\.\d+\.\d+/
skip_commits:
  files:
    - '**/*.md'
test: off
platform:
- x64 # ARM64 is built in the same job
install:
- cmd: git submodule update --init --recursive
- ps: Setup-VS2022
build:
  parallel: true
  verbosity: minimal
build_script:
- ps: powershell -ExecutionPolicy Bypass -File ".\\build.ps1" Ci --configuration Release --platform x64
- ps: powershell -ExecutionPolicy Bypass -File ".\\build.ps1" Ci --configuration Release --platform ARM64
after_build:
# Cab generation moved into NUKE target `BuildCab` (part of `Ci`)
artifacts:
- path: 'artifacts\\msi\\**\\*.msi'
- path: 'disk1\\*.cab'
- path: 'bin**\\*.pdb'
deploy:
- provider: Environment
  name: BUILDBOT
  on:
    appveyor_repo_tag: true